<!DOCTYPE html>
<html>
<head>
    <title>Super Fast Index Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        /* The beautiful background colors and shapes */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); 
            min-height: 100vh; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #333; 
        }
        
        .box { 
            background-color: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
            max-width: 600px; 
            width: 90%; 
            text-align: center; 
        }

        h2 { color: #4a4a4a; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }

        input[type="file"] { 
            display: block; 
            margin: 20px auto; 
            padding: 10px; 
            border: 2px dashed #9face6; 
            border-radius: 10px; 
            background-color: #f9f9f9; 
            cursor: pointer; 
            width: 80%; 
        }

        button { 
            background-color: #5c6bc0; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: background-color 0.3s; 
        }
        
        button:hover { background-color: #3f51b5; }

        .chapter-item { 
            background-color: #f0f4ff; 
            margin: 15px 0; 
            padding: 15px 20px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            border-left: 5px solid #5c6bc0; 
        }
        
        .chapter-item span { text-align: left; font-size: 15px; }
        
        #statusMessage { font-weight: bold; color: #5c6bc0; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Instant Index Reader</h2>
        <p>Choose your PDF file. I will look at its hidden digital index to instantly find your chapters!</p>
        
        <input type="file" id="pdfFile" accept="application/pdf" onchange="readTheIndex()">
        
        <p id="statusMessage">Waiting for your file...</p>
        
        <div id="chapterList"></div>
    </div>

    <script>
        // Tell the helper exactly how to work
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let myOriginalPdfBytes; 
        let foundChapters = [];

        // This function looks directly at the digital map/index
        async function readTheIndex() {
            const fileInput = document.getElementById('pdfFile');
            const statusBox = document.getElementById('statusMessage');
            const chapterListDiv = document.getElementById('chapterList');
            
            if (fileInput.files.length === 0) return;

            statusBox.innerText = "Checking the index... Almost done!";
            chapterListDiv.innerHTML = ""; 
            foundChapters = [];

            try {
                const file = fileInput.files[0];
                myOriginalPdfBytes = await file.arrayBuffer();
                
                const pdf = await pdfjsLib.getDocument({data: myOriginalPdfBytes}).promise;
                const totalPages = pdf.numPages;

                // Ask the PDF file to hand over its digital index (Outline)
                const bookIndex = await pdf.getOutline();

                // If the book creator forgot to put an index in, we tell you
                if (!bookIndex || bookIndex.length === 0) {
                    statusBox.innerText = "Oh no! This specific book does not have a digital index built inside it.";
                    return;
                }

                // Look at every single title listed in the index
                for (let i = 0; i < bookIndex.length; i++) {
                    const item = bookIndex[i];
                    let destination = item.dest;

                    // Sometimes the destination is written in a secret code, so we decode it
                    if (typeof destination === 'string') {
                        destination = await pdf.getDestination(destination);
                    }

                    // If we found the real destination, we figure out exactly what page number it is
                    if (destination) {
                        const pageIndexNumber = await pdf.getPageIndex(destination[0]);
                        foundChapters.push({
                            name: item.title,
                            startPage: pageIndexNumber + 1 // Computers start at 0, so we add 1 to make it normal
                        });
                    }
                }

                // Put the chapters in the correct order, just in case they got mixed up
                foundChapters.sort(function(a, b) { return a.startPage - b.startPage });

                // Use simple math to figure out where each chapter ends
                for (let i = 0; i < foundChapters.length; i++) {
                    if (i + 1 < foundChapters.length) {
                        // A chapter ends right before the next one starts
                        foundChapters[i].endPage = foundChapters[i + 1].startPage - 1;
                    } else {
                        // The very last chapter ends at the end of the book
                        foundChapters[i].endPage = totalPages;
                    }
                }

                // Show the beautiful list on the screen
                statusBox.innerText = "Index found! Click any button below to download your sections.";
                
                foundChapters.forEach(chapter => {
                    // Sometimes the index lists chapters that are on the exact same page, we skip those so it doesn't break
                    if (chapter.startPage <= chapter.endPage) {
                        const itemBox = document.createElement('div');
                        itemBox.className = 'chapter-item';
                        itemBox.innerHTML = `
                            <span><b>${chapter.name}</b> <br> (Pages ${chapter.startPage} to ${chapter.endPage})</span>
                            <button onclick="cutAndDownload(${chapter.startPage}, ${chapter.endPage}, '${chapter.name}')">Download</button>
                        `;
                        chapterListDiv.appendChild(itemBox);
                    }
                });

            } catch (error) {
                statusBox.innerText = "Oops! I had trouble reading the index of this file.";
            }
        }

        // This function acts like scissors to cut out the chapter you click on
        async function cutAndDownload(start, end, chapterName) {
            const statusBox = document.getElementById('statusMessage');
            statusBox.innerText = `Cutting out ${chapterName}...`;

            try {
                const pdfDoc = await PDFLib.PDFDocument.load(myOriginalPdfBytes);
                const newPdf = await PDFLib.PDFDocument.create();

                // Carefully copy the specific pages you asked for
                for (let i = start - 1; i <= end - 1; i++) {
                    const [copiedPage] = await newPdf.copyPages(pdfDoc, [i]);
                    newPdf.addPage(copiedPage);
                }

                // Save the new little book and send it to your computer
                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                // We clean up the chapter name just in case it has weird symbols that computers hate
                const safeName = chapterName.replace(/[^a-zA-Z0-9 ]/g, "");
                link.download = `${safeName}.pdf`;
                link.click();

                statusBox.innerText = `${safeName} is completely ready and downloaded!`;
            } catch (error) {
                statusBox.innerText = "Oops! Something went wrong while I was cutting the pages.";
            }
        }
    </script>
</body>
</html>
